services:
  - type: web
    name: myfinance
    runtime: python
    buildCommand: "npm install --prefix frontend && npm run build --prefix frontend && pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: myfinance-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        value: sandbox

databases:
  - name: myfinance-db
    databaseName: myfinance
    plan: free
